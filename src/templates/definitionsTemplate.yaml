      - alias: "IKOVS_CURRENT-STATE_COMPETENCIES"
        parent: "IKOVS_CURRENT-STATE"
        label_cs: "Zodpovědnosti a kompetence úřadu"
        fill:
          deterministic: false
          ai: true
          chatbot: true
          init: false
        required: false
        value_type: "string"
        depends_on: []
        instructions: ""
        query_hints: ["kompetence", "odpovědnosti"]
        notes: ""

      - alias: "IKOVS_CURRENT-STATE_AGENDA-STATE"
        parent: "IKOVS_CURRENT-STATE"
