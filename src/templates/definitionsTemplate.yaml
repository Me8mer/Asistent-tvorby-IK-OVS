version: 1    # YAML schema version
templates:
  - key: "preface-basic-info.v01"
    label: "IKOVS Preface – Basic Info"
    sections:
    - alias: "IKOVS_PREFACE"
      label_cs: "Úvod"
      parent: null        # root section has no parent
      query_hints: []     # optional list of search hints for web context
      notes: ""           # optional free-form notes
    # - alias: "IKOVS_PREFACE_IDENTIFICATION"
    #   label_cs: "Identifikace Informační koncepce"
    #   parent: "IKOVS_PREFACE"
    #   query_hints: []
    #   notes: ""
    - alias: "IKOVS_PREFACE_BASIC-INFO"
      label_cs: "Základní údaje"
      parent: "IKOVS_PREFACE"
      query_hints:
        - "kontakt"
        - "adresa"
        - "kontakty"
      notes: "" 
    fields:
    - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_NAME"
      parent: "IKOVS_PREFACE_BASIC-INFO"
      label_cs: "Název orgánu veřejné správy"
      fill:
        deterministic: true
        ai: true
        chatbot: true
        init: false
      required: true            # optional; sets IsRequired in FieldDescriptor
      value_type: "string"      # optional; helps value‑hint logic (e.g. "date", "number")
      depends_on: []            # list of field aliases this field depends on
      instructions: ""          # optional human instructions for the UI
      query_hints: []           # optional field‑level query hints
      notes: ""                 # optional free text
    - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_ICO"
      parent: "IKOVS_PREFACE_BASIC-INFO"
      label_cs: "IČO"
      fill:
        deterministic: true
        ai: false
        chatbot: false
        init: false
      required: true
      value_type: "ico"
      depends_on: []
      instructions: ""
      query_hints: [ič, "identifikační číslo"]
      notes: ""
    - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_TYPE"
      parent: "IKOVS_PREFACE_BASIC-INFO"
      label_cs: "Typ organizace"
      fill:
        deterministic: true
        ai: true
        chatbot: false
        init: false
      required: true
      value_type: "enum"
      depends_on: []
      instructions: ""
      query_hints: []
      notes: ""
    - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_ADDRESS"
      parent: "IKOVS_PREFACE_BASIC-INFO"
      label_cs: "Adresa sídla"
      fill:
        deterministic: true
        ai: true
        chatbot: false
        init: false
      required: true
      value_type: "address"
      depends_on: []
      instructions: ""
      query_hints: []
      notes: ""
  - key: "template.v02"
    label: "Template v02"
    sections: []
    fields: []