version: 1    # YAML schema version

templates:
  - key: "preface-basic-info.v01"
    label: "IKOVS Preface – Basic Info"

    # =========================
    # SECTIONS
    # =========================
    sections:

      # Root section
      - alias: "IKOVS_PREFACE"
        label_cs: "Úvod"
        parent: null
        query_hints: []
        notes: ""

      # Basic info subsection
      - alias: "IKOVS_PREFACE_BASIC-INFO"
        label_cs: "Základní údaje"
        parent: "IKOVS_PREFACE"
        query_hints:
          - "kontakt"
          - "adresa"
          - "kontakty"
        notes: ""

      # Current state of architecture
      - alias: "IKOVS_CURRENT-STATE"
        label_cs: "Popis stávajícího stavu architektury"
        parent: null
        query_hints: []
        notes: ""

    # =========================
    # FIELDS
    # =========================
    fields:

      # ---- BASIC INFO ----

      - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_NAME"
        parent: "IKOVS_PREFACE_BASIC-INFO"
        label_cs: "Název orgánu veřejné správy"
        fill:
          deterministic: true
          ai: true
          chatbot: true
          init: false
        required: true
        value_type: "string"
        depends_on: []
        instructions: ""
        query_hints: []
        notes: ""

      - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_ICO"
        parent: "IKOVS_PREFACE_BASIC-INFO"
        label_cs: "IČO"
        fill:
          deterministic: true
          ai: false
          chatbot: false
          init: false
        required: true
        value_type: "ico"
        depends_on: []
        instructions: ""
        query_hints: [ič, "identifikační číslo"]
        notes: ""

      - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_TYPE"
        parent: "IKOVS_PREFACE_BASIC-INFO"
        label_cs: "Typ organizace"
        fill:
          deterministic: true
          ai: true
          chatbot: false
          init: false
        required: true
        value_type: "enum"
        depends_on: []
        instructions: ""
        query_hints: []
        notes: ""

      - alias: "IKOVS_PREFACE_BASIC-INFO_ORG_ADDRESS"
        parent: "IKOVS_PREFACE_BASIC-INFO"
        label_cs: "Adresa sídla"
        fill:
          deterministic: true
          ai: true
          chatbot: false
          init: false
        required: true
